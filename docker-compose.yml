version: '3.8'

services:
  app:
    image: fnshare/family-finance-manager:latest
    container_name: family-finance-manager
    restart: unless-stopped
    ports:
      - "8848:80"
    volumes:
      - ./storage:/var/www/html/storage
    environment:
      - TZ=Asia/Shanghai

